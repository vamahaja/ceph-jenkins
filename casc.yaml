jenkins:
  systemMessage: "Ceph Jenkins Controller"
  numExecutors: 0
  mode: EXCLUSIVE

  # Security configuration
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "admin"

  # Authorization configuration
  authorizationStrategy:
    globalMatrix:
      entries:
        - user:
            name: "admin"
            permissions:
              - "Overall/Administer"
        - user:
            name: "anonymous"
            permissions:
              - "Overall/Read"

  nodes:
    - permanent:
        name: "teuthology-node"
        nodeDescription: "Teuthology Node"
        labelString: "teuthology-node"
        retentionStrategy: "always"
        numExecutors: 10
        credentialsId: "teuthology-node-credentials"

  globalNodeProperties:
    - envVars:
        env:
          - key: "PULP_PROJECT_REPO"
            value: "https://github.com/vamahaja/pulp-project.git"

  # Cloud agent configuration
  clouds:
    - docker:
        name: "podman-cloud"
        containerCap: 10
        dockerApi:
          dockerHost:
            uri: "unix:///var/run/podman.sock"
        templates:
          - name: "ceph-seed-agent"
            labelString: "ceph-seed-agent"
            remoteFs: "/home/jenkins"
            mode: EXCLUSIVE
            pullStrategy: PULL_NEVER
            instanceCapStr: "1"
            dockerTemplateBase:
              image: "ceph-jenkins-seed-agent:latest"
              tty: true
              cpuShares: 256
              memorySwap: 256
              memoryLimit: 256
            connector:
              attach:
                user: "jenkins"
          - name: "ceph-build-fedora39-agent"
            labelString: "ceph-build-fedora39-agent"
            remoteFs: "/home/jenkins"
            mode: EXCLUSIVE
            pullStrategy: PULL_NEVER
            instanceCapStr: "4"
            dockerTemplateBase:
              image: "ceph-jenkins-fedora39-agent:latest"
              tty: true
              cpuShares: 4096
              memoryLimit: 16384
              memorySwap: -1
              environment:
                - "ALLOCATED_CPUS=4"
              mounts:
                - "type=volume,source=jenkins_shared_workspace,destination=/home/jenkins/workspace"
            connector:
              attach:
                user: "jenkins"
          - name: "ceph-build-centos9-agent"
            labelString: "ceph-build-centos9-agent"
            remoteFs: "/home/jenkins"
            mode: EXCLUSIVE
            pullStrategy: PULL_NEVER
            instanceCapStr: "4"
            dockerTemplateBase:
              image: "ceph-jenkins-centos9-agent:latest"
              tty: true
              cpuShares: 4096
              memoryLimit: 16384
              memorySwap: -1
              environment:
                - "ALLOCATED_CPUS=4"
              mounts:
                - "type=volume,source=jenkins_shared_workspace,destination=/home/jenkins/workspace"
            connector:
              attach:
                user: "jenkins"
          - name: "ceph-build-rocky10-agent"
            labelString: "ceph-build-rocky10-agent"
            remoteFs: "/home/jenkins"
            mode: EXCLUSIVE
            pullStrategy: PULL_NEVER
            instanceCapStr: "4"
            dockerTemplateBase:
              image: "ceph-jenkins-rocky10-agent:latest"
              tty: true
              cpuShares: 4096
              memoryLimit: 16384
              memorySwap: -1
              environment:
                - "ALLOCATED_CPUS=4"
              mounts:
                - "type=volume,source=jenkins_shared_workspace,destination=/home/jenkins/workspace"
            connector:
              attach:
                user: "jenkins"
          - name: "ceph-build-ubuntu-noble-agent"
            labelString: "ceph-build-ubuntu-noble-agent"
            remoteFs: "/home/jenkins"
            mode: EXCLUSIVE
            pullStrategy: PULL_NEVER
            instanceCapStr: "4"
            dockerTemplateBase:
              image: "ceph-jenkins-ubuntu-noble-agent:latest"
              tty: true
              cpuShares: 4096
              memoryLimit: 16384
              memorySwap: -1
              environment:
                - "ALLOCATED_CPUS=4"
              mounts:
                - "type=volume,source=jenkins_shared_workspace,destination=/home/jenkins/workspace"
            connector:
              attach:
                user: "jenkins"
          - name: "ceph-build-ubuntu-jammy-agent"
            labelString: "ceph-build-ubuntu-jammy-agent"
            remoteFs: "/home/jenkins"
            mode: EXCLUSIVE
            pullStrategy: PULL_NEVER
            instanceCapStr: "4"
            dockerTemplateBase:
              image: "ceph-jenkins-ubuntu-jammy-agent:latest"
              tty: true
              cpuShares: 4096
              memoryLimit: 16384
              memorySwap: -1
              environment:
                - "ALLOCATED_CPUS=4"
              mounts:
                - "type=volume,source=jenkins_shared_workspace,destination=/home/jenkins/workspace"
            connector:
              attach:
                user: "jenkins"
          - name: "ceph-build-buildah-agent"
            labelString: "ceph-build-buildah-agent"
            remoteFs: "/home/jenkins"
            mode: EXCLUSIVE
            pullStrategy: PULL_NEVER
            instanceCapStr: "4"
            dockerTemplateBase:
              image: "ceph-jenkins-buildah-agent:latest"
              tty: true
              cpuShares: 4096
              memoryLimit: 16384
              memorySwap: -1
              privileged: true
              mounts:
                - "type=volume,source=jenkins_shared_workspace,destination=/home/jenkins/workspace"
            connector:
              attach:
                user: "jenkins"

credentials:
  system:
    domainCredentials:
      - credentials:
          - usernamePassword:
              id: "teuthology-node-credentials"
              description: "Username/Password credentials for teuthology node"
              scope: GLOBAL
          - usernamePassword:
              id: "pulp-credentials"
              description: "Pulp server credentials for artifact uploads"
              scope: GLOBAL

security:
  globalJobDslSecurityConfiguration:
    # Allow Job DSL to run without manual script approval.
    useScriptSecurity: false
  scriptApproval:
    # Allow the specific DSL scripts to bypass the sandbox.
    approvedSignatures:
      - "method javaposse.jobdsl.dsl.DslFactory job java.lang.String"
      - "method javaposse.jobdsl.dsl.Job scm(groovy.lang.Closure)"

# Console color configuration
unclassified:
  ansiColorBuildWrapper:
    globalColorMapName: "xterm"

# Pipeline Graph View configuration
appearance:
  pipelineGraphView:
    showGraphOnBuildPage: true
    showGraphOnJobPage: true
    showStageDurations: true
    showStageNames: true

# Seeder job
jobs:
  - file: "/var/jenkins_home/seed.groovy"
