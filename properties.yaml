jenkins:
  securityRealm:
    local:
      users:
        - id: "admin"
          password: "<your_admin_password>"

  nodes:
    - permanent:
        name: "teuthology-node"
        remoteFs: "<teuthology_node_remote_fs>"
        nodeDescription: "Jenkins agent to execute teuthology runs"
        labelString: "teuthology-node"
        retentionStrategy: "always"
        numExecutors: 10
        launcher:
          ssh:
            host: "<teuthology_node_ip>"
            port: 22
            credentialsId: "teuthology-node-credentials"
            launchTimeoutSeconds: 120
            maxNumRetries: 10
            sshHostKeyVerificationStrategy:
              nonVerifyingKeyVerificationStrategy: {}

  globalNodeProperties:
    - envVars:
        env:
          - key: "PULP_SERVER_URL"
            value: "<pulp_server_url>"

credentials:
  system:
    domainCredentials:
      - credentials:
          - usernamePassword:
              id: "teuthology-node-credentials"
              description: "SSH credentials for teuthology node"
              username: "<teuthology_node_username>"
              password: "<teuthology_node_password>"
          - usernamePassword:
              id: "pulp-credentials"
              description: "Pulp server credentials for artifact uploads"
              username: "<pulp_username>"
              password: "<pulp_password>"

unclassified:
  location:
    url: "http://<your_jenkins_server_ip>:8080"
    adminAddress: "<your_admin_email>"